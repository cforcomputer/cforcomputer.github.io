<!DOCTYPE html>
<html><head>
<meta http-equiv="content-type" content="text/html; charset=windows-1252">
        <script src="ssl-storage_data/asyncStorage.js" type="text/javascript"></script>
        <script>
            var querystring = window.location.search,
                params = {};
            if (querystring.indexOf('?') === 0) {
                var parts = querystring.substring(1).split('&');
                parts.forEach(function(part) {
                    var kv = part.split('=');
                    params[kv[0]] = kv[1];
                });
            }
            var ssl = (params.ssl) ? 's' : '',
                port = (params.port) ? (':' + params.port) : '';

            TutorsAsyncStorage.child(window, {
                origin: 'http' + ssl + '://' + window.location.hostname + port + '/',
                scope: 'chat-storage'
                //,debugOutput: true
            });
        </script>
    </head>
    <body>

</body></html>
